# =============================================================================
# SPH Landslide Simulation Configuration
# =============================================================================

# 프로젝트 정보
project:
  name: "guryong_landslide"
  description: "구룡산 산사태 시뮬레이션"

# 지형 데이터 (terrain_processor 출력물 사용)
terrain:
  dem_file: "guryong_dem_10m_terrain_crop.npy"
  metadata_file: "guryong_dem_10m_metadata.json"
  satellite_file: "guryong_dem_10m_satellite_crop.png"

# 초기 조건 (붕괴 위치 및 형상)
initial_condition:
  type: "arbitrary_blob"  # circular, arbitrary_blob, from_file
  center: [207000, 542000]  # (x, y) in CRS coordinates
  radius: 25  # meters
  thickness: 2.0  # initial flow depth (m)
  n_lobes: 5  # for arbitrary_blob
  seed: 42  # random seed

# SPH 수치 파라미터
sph:
  h: 1.0  # smoothing length (m)
  particle_spacing_factor: 1.0  # spacing = h * factor
  dt: 0.003  # time step (s)
  v_max: 10.0  # velocity ceiling (m/s), 108 km/h

# 물성 파라미터
material:
  rho0: 2000.0  # reference density (kg/m³)
  c0: 100.0  # speed of sound (m/s), 10*v_max for ~1% compressibility
  gamma: 7.0  # EOS exponent

# 유변학 (Rheology)
rheology:
  mu: 100.0  # dynamic viscosity (Pa·s)
  tau_y: 500.0  # yield stress (Pa)
  mu_b: 0.1  # basal friction coefficient
  xi: 200.0  # turbulent coefficient (m/s²)
  alpha: 0.1  # artificial viscosity
  beta: 0.1  # artificial viscosity

# 침식/퇴적 (Entrainment - Takahashi 2007)
entrainment:
  enabled: true
  delta_e: 0.0007  # erosion coefficient
  delta_d: 0.01  # deposition coefficient
  rho_s: 2650.0  # solid density (kg/m³)
  rho_w: 1000.0  # water density (kg/m³)
  phi_bed: 35.0  # bed friction angle (degrees)
  C_init: 0.4  # initial concentration
  C_max: 0.65  # maximum packing

# 시뮬레이션 실행
simulation:
  duration: 120.0  # total time (s)
  save_interval: 0.2  # output interval (s)

# 출력 설정
output:
  results_file: "simulation_results.npz"
  log_file: "simulation_log.txt"
  animation_file: "landslide_animation.gif"
